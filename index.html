<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    background:#fff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    margin-bottom:20px;
    color:#333;
}

#count{
    font-size:70px;
    font-weight:bold;
    margin:25px 0;
    color:#000;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:12px 25px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

#increase{
    background:#28a745;
    color:white;
}

#decrease{
    background:#dc3545;
    color:white;
}

#reset{
    background:#007bff;
    color:white;
}

button:hover{
    transform:scale(1.08);
}

button:active{
    transform:scale(.95);
}
</style>

</head>
<body>

<div class="container">
    <h1>Counter App</h1>

    <div id="count">0</div>

    <div class="buttons">
        <button id="decrease">-</button>
        <button id="reset">Reset</button>
        <button id="increase">+</button>
    </div>
</div>

<script>
const count = document.getElementById("count");
const increase = document.getElementById("increase");
const decrease = document.getElementById("decrease");
const reset = document.getElementById("reset");

let value = 0;

function updateCounter() {
    count.textContent = value;

    if (value > 0) {
        count.style.color = "green";
    } else if (value < 0) {
        count.style.color = "red";
    } else {
        count.style.color = "black";
    }
}

increase.addEventListener("click", function () {
    value++;
    updateCounter();
});

decrease.addEventListener("click", function () {
    value--;
    updateCounter();
});

reset.addEventListener("click", function () {
    value = 0;
    updateCounter();
});

updateCounter();
</script>

</body>
</html>
